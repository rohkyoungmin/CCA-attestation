# Realm shell overlay
#
# Keep the standalone shim / unmodified Zephyr payload model, but restore an
# interactive UART path using an out-of-tree polling UART driver that accepts
# the shared-alias MMIO address directly.

CONFIG_EARLY_CONSOLE=n
CONFIG_BOOT_BANNER=n

CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_ARM_ARCH_TIMER=y

CONFIG_PRINTK=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=y

CONFIG_SHELL=y
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_INTERRUPT_DRIVEN=n
CONFIG_SHELL_BACKEND_SERIAL_RX_POLL_PERIOD=10
CONFIG_SHELL_PROMPT_UART="realm:~$ "
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_CMD_BUFF_SIZE=128
CONFIG_KERNEL_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_DEVMEM_SHELL=n
