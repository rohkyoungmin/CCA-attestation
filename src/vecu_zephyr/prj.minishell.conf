# Realm mini-shell overlay
#
# Keep the proven headless/main bring-up path, but expose a polling UART
# command loop from the payload app after main() starts.

CONFIG_EARLY_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_BOOT_BANNER=n

# Keep printk compiled so existing code can stay unchanged even though the
# mini shell writes directly to the Realm-safe UART MMIO path.
CONFIG_PRINTK=y

# Shell core runs over the app-owned UART loop via dummy backend.
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_ARM_ARCH_TIMER=n
CONFIG_SHELL_BACKEND_SERIAL=n

# Enable Zephyr shell core, but keep transport under application control.
# Commands are executed through the dummy backend and the output is forwarded
# over the proven polling UART mini transport in main().
CONFIG_SHELL=y
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_BACKEND_DUMMY=y
CONFIG_SHELL_PROMPT_DUMMY=""
CONFIG_SHELL_BACKEND_DUMMY_BUF_SIZE=512
CONFIG_SHELL_CMD_BUFF_SIZE=128
CONFIG_SHELL_PRINTF_BUFF_SIZE=128
CONFIG_SHELL_CMDS=y
CONFIG_SHELL_HELP=y
CONFIG_SHELL_TAB=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_LOG_BACKEND=n
