# Headless Realm bring-up overlay
#
# Use the shared status page to prove Zephyr app execution first, without
# depending on early UART/console device init in PRE_KERNEL_1.

CONFIG_EARLY_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_BOOT_BANNER=n

# Keep printk compiled so existing app code does not need to change. There is
# simply no early console backend in this mode.
CONFIG_PRINTK=y
